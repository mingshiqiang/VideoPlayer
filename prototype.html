<meta charset="UTF-8">
<style>
  :root {
    --bg-deep: #0a0a0c;
    --bg-panel: rgba(20, 20, 24, 0.88);
    --bg-hover: rgba(255, 255, 255, 0.08);
    --bg-active: rgba(255, 255, 255, 0.14);
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.70);
    --text-muted: rgba(255, 255, 255, 0.45);
    --accent: #7c3aed;
    --accent-light: #a78bfa;
    --success: #22c55e;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, "SF Pro Display", "Microsoft YaHei UI", "PingFang SC", sans-serif;
    background: #f0f0f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    color: var(--text-primary);
  }
  .device {
    width: 1100px;
    height: 680px;
    background: var(--bg-deep);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: flex;
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .title-bar {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.35), transparent);
    -webkit-app-region: drag;
  }
  .title-left, .title-right { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 14px; height: 14px; }
  .title-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.2px;
  }
  .win-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s ease;
  }
  .win-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .win-btn.close:hover { background: #ef4444; color: #fff; }
  .video-canvas {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(circle at center, #15151a 0%, #0a0a0c 100%);
  }
  .big-play {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .big-play:hover { transform: scale(1.06); background: rgba(124,58,237,0.25); }
  .big-play svg { width: 36px; height: 36px; margin-left: 4px; }
  .control-bar {
    height: 72px;
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 0 18px 10px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 8px;
  }
  .seek-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 6px;
  }
  .time-code {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 42px;
    text-align: center;
  }
  .seek-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    transition: height 0.15s ease;
  }
  .seek-track:hover { height: 8px; border-radius: 4px; }
  .seek-buffered {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 62%;
    background: rgba(255,255,255,0.28);
    border-radius: inherit;
  }
  .seek-played {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 38%;
    background: var(--accent);
    border-radius: inherit;
  }
  .seek-thumb {
    position: absolute;
    left: 38%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .seek-track:hover .seek-thumb { opacity: 1; }
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .controls-left, .controls-center, .controls-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ctrl-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .ctrl-btn.play { width: 44px; height: 44px; color: var(--text-primary); }
  .ctrl-btn.play:hover { background: var(--bg-hover); transform: scale(1.05); }
  .ctrl-btn svg { width: 20px; height: 20px; }
  .ctrl-btn.play svg { width: 22px; height: 22px; }
  .volume-wrap {
    display: flex; align-items: center;
    gap: 2px;
  }
  .volume-slider {
    width: 90px;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    margin: 0 8px;
  }
  .volume-level {
    width: 72%;
    height: 100%;
    background: var(--text-secondary);
    border-radius: inherit;
  }
  .playlist-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pl-close-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s ease;
  }
  .pl-close-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .pl-close-btn svg { width: 16px; height: 16px; }
  .pl-toggle-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s ease;
  }
  .pl-toggle-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .pl-toggle-btn.active { color: var(--accent-light); background: var(--bg-hover); }
  .pl-toggle-btn svg { width: 20px; height: 20px; }
  .playlist {
    transition: width 0.25s cubic-bezier(0.16,1,0.3,1), opacity 0.2s ease;
  }
  .playlist.collapsed {
    width: 0;
    opacity: 0;
    border-left: none;
    overflow: hidden;
  }
  .playlist {
    width: 300px;
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    border-left: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
  }
  .playlist-header {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .playlist-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .playlist-count {
    font-size: 12px;
    color: var(--text-muted);
  }
  .playlist-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .pl-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s ease;
    position: relative;
  }
  .pl-item:hover { background: var(--bg-hover); }
  .pl-item.active { background: var(--bg-hover); }
  .pl-item.active::before {
    content: "";
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .pl-thumb {
    width: 96px; height: 54px;
    background: #22222a;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    font-size: 11px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .pl-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .pl-info { flex: 1; min-width: 0; }
  .pl-title {
    font-size: 13px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .pl-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 8px;
  }
  .pl-playing {
    width: 14px; height: 14px;
    color: var(--accent-light);
  }
  .drop-zone {
    position: absolute;
    inset: 10px;
    border: 2px dashed rgba(124,58,237,0.45);
    border-radius: var(--radius-md);
    background: rgba(124,58,237,0.08);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-secondary);
    z-index: 20;
  }
  .drop-zone.show { display: flex; }
  .drop-zone svg { width: 64px; height: 64px; color: var(--accent-light); }
  .drop-zone h3 { margin: 0; font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .drop-zone p { margin: 0; font-size: 13px; }
  .format-tags { display: flex; gap: 8px; margin-top: 8px; }
  .format-tag {
    padding: 4px 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-secondary);
    z-index: 5;
  }
  .empty-state svg { width: 64px; height: 64px; color: var(--text-muted); }
  .empty-state h3 { margin: 0; font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .empty-state p { margin: 0; font-size: 13px; }
</style>

<script>
  (function() {
    var playlist = document.querySelector('.playlist');
    var toggleBtn = document.getElementById('pl-toggle');
    var closeBtn = document.getElementById('pl-close');

    function togglePlaylist() {
      var collapsed = playlist.classList.toggle('collapsed');
      if (collapsed) {
        toggleBtn.classList.remove('active');
      } else {
        toggleBtn.classList.add('active');
      }
    }

    if (toggleBtn) toggleBtn.addEventListener('click', togglePlaylist);
    if (closeBtn) closeBtn.addEventListener('click', togglePlaylist);
  })();
</script>
